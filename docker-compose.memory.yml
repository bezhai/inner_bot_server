version: '3.8'

services:
  # 记忆服务
  memory-service:
    build:
      context: ./memory-service
    ports:
      - "8080:8000"  # 使用8080端口避免与机器A的AI服务冲突
    environment:
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-memory:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis-memory:6379/0
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    env_file:
      - .env
    volumes:
      - memory_service_logs:/var/log/memory-service
    depends_on:
      - redis-memory
      - postgres-memory
      - qdrant
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Redis 服务 (用于记忆服务缓存)
  redis-memory:
    image: "redis:7.2"
    ports:
      - "6380:6379"  # 使用6380端口避免与机器A的Redis冲突
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis_memory_data:/data
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # PostgreSQL 服务 (用于记忆服务数据存储)
  postgres-memory:
    image: postgres:17.2-bookworm
    ports:
      - "5433:5432"  # 使用5433端口避免与机器A的PostgreSQL冲突
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}_memory
    volumes:
      - postgres_memory_data:/var/lib/postgresql/data
      - ./memory-service/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}_memory"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Qdrant 向量数据库 (用于记忆检索)
  qdrant:
    image: qdrant/qdrant:v1.7.4
    ports:
      - "6333:6333"  # REST API端口
      - "6334:6334"  # gRPC端口
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__LOG_LEVEL=INFO
    volumes:
      - qdrant_data:/qdrant/storage
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 记忆服务监控面板 (可选)
  memory-dashboard:
    image: nginx:alpine
    ports:
      - "8081:80"
    volumes:
      - ./memory-service/dashboard:/usr/share/nginx/html
    depends_on:
      - memory-service
    restart: always

volumes:
  redis_memory_data:
  postgres_memory_data:
  qdrant_data:
  memory_service_logs:

networks:
  default:
    name: memory-network
    driver: bridge 